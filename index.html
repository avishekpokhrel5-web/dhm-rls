<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RLS Station Daily Status Register — DHM 2026</title>
<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#e8edf3;padding:16px}
select,input,button{font-family:inherit}

/* ── PASSWORD EYE TOGGLE ── */
.pw-wrap{position:relative;display:flex;align-items:center}
.pw-wrap input{flex:1;padding-right:32px!important}
.pw-eye{position:absolute;right:8px;background:none;border:none;cursor:pointer;
  padding:0;font-size:15px;line-height:1;color:#94a3b8;user-select:none;
  display:flex;align-items:center}
.pw-eye:hover{color:#475569}

/* ── LOGIN ── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0b1e38 0%,#1a3558 55%,#2b4d7c 100%);padding:20px}
.login-card{width:100%;max-width:420px;background:#fff;border-radius:12px;overflow:hidden;
  box-shadow:0 12px 50px rgba(0,0,0,0.35)}
.login-header{background:#1a3558;color:#fff;padding:24px 28px}
.login-logo{font-size:32px;margin-bottom:8px}
.login-title{font-size:16px;font-weight:bold;margin-bottom:3px}
.login-sub{font-size:11px;opacity:0.6;line-height:1.5}
.login-body{padding:24px 28px}
.lf{margin-bottom:16px}
.lf label{display:block;font-size:11px;font-weight:bold;color:#475569;margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.05em}
.lf input{width:100%;padding:9px 12px;border:1.5px solid #d1d5db;border-radius:6px;
  font-size:13px;outline:none;transition:border-color .15s}
.lf input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.captcha-box{background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:8px;
  padding:10px 16px;text-align:center;font-size:22px;font-weight:bold;
  color:#1a3558;letter-spacing:6px;font-family:monospace;margin-bottom:6px}
.btn-login{width:100%;padding:11px;background:#1a3558;color:#fff;border:none;
  border-radius:7px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:4px;
  transition:background .15s}
.btn-login:hover{background:#2563eb}
.login-err{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;
  padding:8px 12px;border-radius:5px;font-size:12px;margin-bottom:14px}
.login-hint{font-size:11px;color:#94a3b8;text-align:center;margin-top:12px}

/* ── APP SHELL ── */
#app{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.12)}

/* ── HEADER ── */
.header{background:#1a3558;color:#fff;padding:12px 16px}
.header-title{font-size:14px;font-weight:bold;margin-bottom:10px;cursor:pointer;display:inline-block}
.header-title:hover{opacity:.85;text-decoration:underline;text-underline-offset:3px}
.header-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.ctrl{display:flex;align-items:center;gap:5px}
.ctrl-lbl{font-size:11px;opacity:.7;white-space:nowrap}
.hdr-sel{font-size:12px;padding:4px 6px;border-radius:4px;
  border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);
  color:#fff;cursor:pointer}
.hdr-sel option{color:#000;background:#fff}
.hdr-btn{font-size:11px;padding:4px 10px;border-radius:4px;
  border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);
  color:#fff;cursor:pointer;white-space:nowrap}
.hdr-btn:hover{background:rgba(255,255,255,.2)}
.hdr-btn-red{border-color:rgba(255,150,150,.4);background:rgba(200,40,40,.2)}
.hdr-btn-red:hover{background:rgba(200,40,40,.35)}
.hdr-btn-active{background:rgba(255,255,255,.22);font-weight:bold}
.hdr-btn-lock{background:rgba(160,110,0,.3);border-color:rgba(255,200,80,.5);color:#fde68a}
.hdr-btn-lock:hover{background:rgba(180,130,0,.45)}
.hdr-btn-locked{background:rgba(160,0,0,.35);border-color:rgba(255,120,120,.5);
  color:#fca5a5;font-weight:bold}
.manage-btn{font-size:11px;padding:5px 12px;border-radius:4px;
  border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.1);
  color:#fff;cursor:pointer;white-space:nowrap}
.manage-btn:hover,.manage-btn.active{background:rgba(255,255,255,.22)}
.user-pill{font-size:11px;padding:3px 10px;border-radius:20px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.85);display:flex;align-items:center;gap:5px}
.logout-btn{font-size:10px;padding:2px 7px;border-radius:4px;
  border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.7);cursor:pointer}
.logout-btn:hover{background:rgba(180,0,0,.3);color:#fca5a5}
.sub-panel{margin-top:10px;background:rgba(0,0,0,.22);border-radius:6px;padding:10px 12px}
.sub-panel-row{display:flex;gap:8px;align-items:center}
.sub-panel input{flex:1;font-size:12px;padding:5px 8px;border-radius:4px;
  border:none;background:rgba(255,255,255,.92);color:#000;outline:none}
.btn-add{padding:5px 14px;background:#2563eb;border:none;color:#fff;
  border-radius:4px;font-size:12px;cursor:pointer}
.btn-add:hover{background:#1d4ed8}
.btn-x{padding:5px 9px;background:rgba(255,255,255,.15);border:none;
  color:#fff;border-radius:4px;font-size:12px;cursor:pointer}
.del-panel{margin-top:10px;background:rgba(0,0,0,.22);border-radius:6px;
  overflow:hidden;border:1px solid rgba(255,120,120,.3)}
.del-panel-info{font-size:11px;padding:8px 12px;opacity:.7;
  border-bottom:1px solid rgba(255,255,255,.1)}
.del-row{display:flex;justify-content:space-between;align-items:center;
  padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
.del-row-name{font-size:12px}
.del-row-name.current{opacity:.6;font-style:italic}
.btn-del-off{font-size:11px;padding:3px 10px;border-radius:4px;
  border:1px solid rgba(255,120,120,.5);background:rgba(200,40,40,.25);
  color:#fca5a5;cursor:pointer}
.btn-del-off:hover{background:rgba(200,40,40,.45)}
.protected-lbl{font-size:10px;opacity:.45;font-style:italic}

/* ── TOAST ── */
.toast{padding:8px 14px;border-radius:6px;font-size:12px;margin-bottom:8px;font-weight:bold}
.toast-ok{background:#f0fdf4;border:1px solid #86efac;color:#15803d}
.toast-err{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626}

/* ── LEGEND & LOCK BANNER ── */
.legend{display:flex;flex-wrap:wrap;gap:14px;padding:6px 14px;
  background:#edf2f7;border-bottom:1px solid #d1dce8;align-items:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px}
.leg-code{font-weight:bold;font-size:12px}
.leg-hint{margin-left:auto;font-size:10px;color:#94a3b8;font-style:italic}
/* lock banner replaced by a small inline tag on the legend bar */
.lock-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;
  font-weight:bold;color:#92400e;background:#fef9c3;border:1px solid #fbbf24;
  border-radius:12px;padding:2px 10px;white-space:nowrap}
.lock-tag .unlock-lnk{font-size:10px;color:#2563eb;cursor:pointer;
  text-decoration:underline;margin-left:4px;font-weight:normal}
.lock-tag .unlock-lnk:hover{color:#1d4ed8}

/* ── MANAGE STATIONS PANEL ── */
.manage-panel{background:#f8fafc;border-bottom:1px solid #d1dce8;padding:14px 16px}
.manage-title{font-weight:bold;font-size:13px;color:#1a3558;margin-bottom:12px}
.manage-title .off{color:#2563eb}
.manage-title .sub{color:#7c3aed}
.stn-form{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;
  background:#fff;padding:10px 12px;border-radius:6px;
  border:1px solid #e2e8f0;margin-bottom:12px}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:10px;color:#64748b}
.fld input,.fld select{font-size:12px;padding:5px 8px;border-radius:4px;
  border:1px solid #d1d5db;background:#fff;color:#000;outline:none}
.fld-grow{flex:1;min-width:180px}
.fld-grow input{width:100%}
.btn-stn-add{padding:6px 14px;background:#1a3558;color:#fff;border:none;
  border-radius:4px;font-size:12px;cursor:pointer;font-weight:bold;
  align-self:flex-end;height:31px}
.btn-stn-add:hover{background:#2b4d7c}
.stn-list{max-height:200px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:6px}
.stn-list table{width:100%;border-collapse:collapse;font-size:12px}
.stn-list thead th{background:#dce7f0;padding:5px 8px;font-weight:bold;color:#1a3558;
  border-bottom:1px solid #c4d4e3;font-size:11px;position:sticky;top:0;z-index:1}
.stn-list tbody td{padding:4px 8px;border-bottom:1px solid #f1f5f9;font-size:12px}
.stn-list tbody tr:nth-child(even) td{background:#f8fafc}
.btn-rm{font-size:11px;color:#dc2626;background:none;border:none;cursor:pointer;padding:2px 6px}
.btn-rm:hover{text-decoration:underline}
.btn-edit{font-size:11px;color:#2563eb;background:none;border:none;cursor:pointer;padding:2px 6px}
.btn-edit:hover{text-decoration:underline}
.stn-actions{display:flex;gap:4px;align-items:center;white-space:nowrap}
.edit-row td{background:#eff6ff!important;padding:6px 8px!important}
.edit-inline{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-end}
.edit-inline input,.edit-inline select{font-size:12px;padding:4px 7px;border-radius:4px;
  border:1px solid #93c5fd;background:#fff;color:#000;outline:none}
.edit-inline .btn-save{padding:4px 12px;background:#2563eb;color:#fff;border:none;
  border-radius:4px;font-size:12px;cursor:pointer;font-weight:bold}
.edit-inline .btn-save:hover{background:#1d4ed8}
.edit-inline .btn-cancel{padding:4px 10px;background:#f1f5f9;color:#374151;border:1px solid #d1d5db;
  border-radius:4px;font-size:12px;cursor:pointer}
.edit-inline .btn-cancel:hover{background:#e2e8f0}
.empty-note{color:#94a3b8;font-size:12px;font-style:italic;padding:8px 0}

/* ── USER MANAGEMENT ── */
.user-mgmt-panel{background:#f0f7ff;border-bottom:1px solid #bfdbfe;padding:14px 16px}
.user-form{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;
  background:#fff;padding:10px 12px;border-radius:6px;
  border:1px solid #dbeafe;margin-bottom:12px}
.user-list-wrap{border:1px solid #e2e8f0;border-radius:6px;overflow:hidden}
.user-list-wrap table{width:100%;border-collapse:collapse;font-size:12px}
.user-list-wrap thead th{background:#dce7f0;padding:5px 8px;font-weight:bold;
  color:#1a3558;border-bottom:1px solid #c4d4e3;font-size:11px}
.user-list-wrap tbody td{padding:5px 8px;border-bottom:1px solid #f1f5f9;font-size:12px;
  vertical-align:top}
.user-list-wrap tbody tr:nth-child(even) td{background:#f8fafc}
.role-pill{display:inline-block;font-size:10px;padding:2px 8px;
  border-radius:10px;font-weight:bold}
.role-admin{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.role-de{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.off-checks{display:flex;flex-wrap:wrap;gap:4px;padding:2px 0}
.off-checks label{display:flex;align-items:center;gap:3px;font-size:11px;
  cursor:pointer;background:#f1f5f9;padding:2px 7px;border-radius:4px;
  border:1px solid #e2e8f0}
.off-checks label:hover{background:#dce7f0}
.sub-checks{display:flex;flex-wrap:wrap;gap:4px;padding:2px 0}
.sub-checks label{display:flex;align-items:center;gap:3px;font-size:11px;
  cursor:pointer;background:#f0fdf4;padding:2px 7px;border-radius:4px;
  border:1px solid #bbf7d0}
.sub-checks label:hover{background:#dcfce7}
.sub-checks label.snow{background:#eff6ff;border-color:#bfdbfe}
.sub-checks label.snow:hover{background:#dbeafe}
.perm-section{margin-top:6px}
.perm-section-lbl{font-size:10px;font-weight:bold;color:#475569;text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:4px}
.btn-sm{font-size:11px;padding:3px 8px;border-radius:4px;cursor:pointer;
  border:1px solid #d1d5db;background:#fff;color:#374151}
.btn-sm:hover{background:#f1f5f9}
.btn-sm-red{color:#dc2626;border-color:rgba(220,38,38,.3);background:#fef2f2}
.btn-sm-red:hover{background:#fee2e2}
.btn-sm-blue{color:#2563eb;border-color:rgba(37,99,235,.3);background:#eff6ff}
.btn-sm-blue:hover{background:#dbeafe}

/* ── STATUS TABLE ── */
.tbl-wrap{overflow-x:auto}
table.status{border-collapse:collapse;font-size:11px}
table.status th{background:#2b4d7c;color:#fff;padding:5px 4px;text-align:center;
  font-size:11px;border-right:1px solid rgba(255,255,255,.15);
  white-space:nowrap;vertical-align:middle}
table.status th.dark{background:#1a3558}
table.status th.tleft{text-align:left;padding-left:8px}
table.status th.dim{opacity:.25}

table.status td{padding:3px 4px;border-right:1px solid #e2e8f0;
  font-size:11px;vertical-align:middle}
table.status tbody tr:nth-child(even) td{background:#f8fafc}
table.status td.day{text-align:center;padding:0;cursor:pointer;
  user-select:none;width:26px;height:22px;font-weight:bold;font-size:11px}
table.status td.day:hover:not(.dlocked){filter:brightness(.88)}
table.status td.day.dlocked{cursor:not-allowed!important;
  background-image:repeating-linear-gradient(
    45deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 6px
  )!important}
table.status td.grayed{background:#f1f5f9}
table.status td.active-days{text-align:center;font-weight:bold;
  color:#15803d;background:#f0fdf4}
table.status td.inactive-days{text-align:center;font-weight:bold;
  color:#dc2626;background:#fef2f2}
table.status tfoot tr td{background:#f8fafc;font-size:11px}
table.status tfoot tr.total td{background:#dce7f0;border-top:2px solid #2b4d7c}
table.status tfoot td.flbl{text-align:right;padding:4px 10px;
  font-weight:bold;border-right:1px solid #e2e8f0}
table.status td.no-stn{padding:30px;text-align:center;
  color:#94a3b8;font-style:italic}


/* ── ANNUAL SUMMARY — VERTICAL 2-COL GRID ── */
.summary-wrap{padding:12px 14px}
.sum-action-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #e2e8f0}
.sum-info{font-size:11px;color:#64748b;flex:1}
.btn-dl{font-size:11px;padding:6px 14px;border-radius:5px;border:1px solid #d1d5db;
  background:#fff;color:#1a3558;cursor:pointer;font-weight:bold;
  display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn-dl:hover{background:#eff6ff;border-color:#93c5fd;color:#2563eb}
.btn-dl-pdf{border-color:#fca5a5;color:#dc2626}
.btn-dl-pdf:hover{background:#fef2f2;border-color:#f87171}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:900px){.sum-grid{grid-template-columns:1fr}}
.sum-section{border:1px solid #d1dce8;border-radius:7px;overflow:hidden}
.sum-sec-hdr{background:#2b4d7c;color:#fff;padding:6px 10px;font-size:12px;
  font-weight:bold;display:flex;justify-content:space-between;align-items:center}
.sum-sec-body{overflow-x:auto}
table.sum-month{border-collapse:collapse;font-size:10px;min-width:100%}
table.sum-month th{background:#1e3d6a;color:#fff;padding:3px 2px;text-align:center;
  font-size:9px;border-right:1px solid rgba(255,255,255,.1);white-space:nowrap}
table.sum-month th.tleft{text-align:left;padding-left:6px}
table.sum-month td{padding:1px 2px;border-right:1px solid #e8edf3;
  font-size:10px;vertical-align:middle}
table.sum-month tbody tr:nth-child(even) td{background:#f8fafc}
table.sum-month td.mtick{width:13px;height:17px;padding:0;text-align:center;
  font-size:8px;font-weight:bold;cursor:pointer}
table.sum-month td.mtick:hover{filter:brightness(.88)}
table.sum-month td.mcnt{width:22px;text-align:center;font-size:10px;font-weight:bold;padding:2px}
table.sum-month tfoot td{background:#dce7f0;border-top:1px solid #b0c4d8;
  font-size:9px;text-align:center;font-weight:bold}
.no-data-msg{padding:30px;text-align:center;color:#94a3b8;font-style:italic;font-size:12px}

/* ── STATUS POPUP ── */
#status-popup{position:fixed;z-index:9998;background:#fff;border:1px solid #d1dce8;
  border-radius:7px;box-shadow:0 6px 24px rgba(0,0,0,.18);
  min-width:180px;overflow:hidden;display:none}
.sp-title{padding:5px 12px;font-size:10px;color:#64748b;background:#f8fafc;
  border-bottom:1px solid #e2e8f0;font-weight:bold;text-transform:uppercase;
  letter-spacing:.05em}
.sp-opt{display:flex;align-items:center;padding:7px 12px;cursor:pointer;
  gap:8px;font-size:12px;border-bottom:1px solid #f1f5f9;transition:background .1s}
.sp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sp-chk{width:14px;font-size:10px;text-align:center;color:#64748b}

/* ── SYNC / FOOTER / TABS ── */
#sync-bar{position:fixed;bottom:12px;right:14px;z-index:9999}
.sync-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;
  border-radius:20px;font-size:11px;font-weight:bold;
  box-shadow:0 2px 8px rgba(0,0,0,.15)}
.sync-ok{background:#f0fdf4;border:1px solid #86efac;color:#15803d}
.sync-save{background:#eff6ff;border:1px solid #93c5fd;color:#1d4ed8}
.sync-err{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626}
.sync-init{background:#fefce8;border:1px solid #fde047;color:#92400e}
.sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block}
.footer{padding:6px 14px;background:#edf2f7;border-top:1px solid #d1dce8;
  font-size:10px;color:#94a3b8;display:flex;justify-content:space-between;
  flex-wrap:wrap;gap:4px}
.dev-footer{padding:5px 14px;background:#1a3558;color:rgba(255,255,255,.45);
  font-size:10px;text-align:right;letter-spacing:.03em;border-radius:0 0 8px 8px}
.tabs{display:flex;background:#162d48;border-bottom:2px solid #2b4d7c}
.tab{padding:8px 20px;font-size:12px;color:rgba(255,255,255,.55);cursor:pointer;
  border:none;background:none;border-bottom:2px solid transparent;
  margin-bottom:-2px;white-space:nowrap}
.tab:hover{color:rgba(255,255,255,.85)}
.tab.active{color:#fff;font-weight:bold;border-bottom:2px solid #60a5fa}

/* ── LOCK WARNING MODAL ── */
.lock-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;
  display:flex;align-items:center;justify-content:center;}
.lock-modal{background:#fff;border-radius:12px;width:460px;max-width:95vw;
  box-shadow:0 12px 50px rgba(0,0,0,.3);overflow:hidden;}
.lock-modal-hdr{background:#1a3558;color:#fff;padding:16px 20px;
  display:flex;align-items:center;gap:10px;}
.lock-modal-hdr .icon{font-size:22px;}
.lock-modal-hdr .ttl{font-size:14px;font-weight:bold;}
.lock-modal-hdr .sub{font-size:11px;opacity:.65;margin-top:2px;}
.lock-modal-body{padding:16px 20px;max-height:320px;overflow-y:auto;}
.lock-warn-intro{font-size:12px;color:#374151;margin-bottom:10px;line-height:1.5;}
.lock-warn-intro b{color:#dc2626;}
.miss-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px;}
.miss-table th{background:#dce7f0;padding:4px 8px;text-align:left;
  font-size:10px;color:#1a3558;border-bottom:1px solid #c4d4e3;}
.miss-table td{padding:4px 8px;border-bottom:1px solid #f1f5f9;}
.miss-table tbody tr:nth-child(even) td{background:#f8fafc;}
.miss-days{font-size:10px;color:#dc2626;font-weight:bold;}
.lock-modal-foot{padding:12px 20px;background:#f8fafc;border-top:1px solid #e2e8f0;
  display:flex;gap:8px;justify-content:flex-end;align-items:center;}
.lock-modal-foot .warn-note{flex:1;font-size:11px;color:#92400e;
  background:#fef9c3;border:1px solid #fbbf24;border-radius:5px;
  padding:5px 10px;line-height:1.4;}
.btn-lock-cancel{padding:7px 16px;background:#f1f5f9;color:#374151;
  border:1px solid #d1d5db;border-radius:6px;font-size:12px;cursor:pointer;}
.btn-lock-cancel:hover{background:#e2e8f0;}

<script>
var GS_URL="https://script.google.com/macros/s/AKfycbwRW9euFRs7xUtoxJqpqRjeqAjjPZVPrSsp9qT4kQVeXIn3_tI81QZvI91QklI1ZHKeqw/exec";
var _saveTimer=null,_lastSaved=null;

function setSyncStatus(type,msg){
  var bar=document.getElementById("sync-bar");
  if(!bar)return;
  var cls={ok:"sync-ok",save:"sync-save",err:"sync-err",init:"sync-init"}[type]||"sync-init";
  bar.innerHTML='<span class="sync-pill '+cls+'"><span class="sync-dot"></span> '+msg+'</span>';
}
function gsLoad(cb){
  setSyncStatus("init","Loading data…");
  // Protect rls_users: user accounts and office assignments are local-authoritative.
  // The 30-second auto-refresh must NEVER wipe assignments by pulling stale sheet data.
  var PROTECTED=["rls_users"];
  var localSnap={};
  PROTECTED.forEach(function(k){try{var v=localStorage.getItem(k);if(v)localSnap[k]=v;}catch(e){}});

  fetch(GS_URL,{method:"GET"})
  .then(function(r){return r.json();})
  .then(function(data){
    if(data&&typeof data==="object"){
      Object.keys(data).forEach(function(k){
        if(PROTECTED.indexOf(k)>=0)return; // skip — local wins
        try{localStorage.setItem(k,JSON.stringify(data[k]));}catch(e){}
      });
      // Restore protected keys from snapshot; seed from sheet only if nothing local
      PROTECTED.forEach(function(k){
        if(localSnap[k]){try{localStorage.setItem(k,localSnap[k]);}catch(e){}}
        else if(data[k]!==undefined){try{localStorage.setItem(k,JSON.stringify(data[k]));}catch(e){}}
      });
      setSyncStatus("ok","Loaded ✓");
    }
    if(cb)cb(true);
  })
  .catch(function(){setSyncStatus("err","Load failed — using local data");if(cb)cb(false);});
}
function gsSave(){
  var payload={};
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.indexOf("rls")===0){
      try{payload[k]=JSON.parse(localStorage.getItem(k));}catch(e){payload[k]=localStorage.getItem(k);}
    }
  }
  var json=JSON.stringify(payload);
  if(json===_lastSaved)return;
  _lastSaved=json;
  setSyncStatus("save","Saving…");
  fetch(GS_URL,{method:"POST",body:json})
  .then(function(r){return r.text();})
  .then(function(){setSyncStatus("ok","Saved to Google Sheet ✓");})
  .catch(function(){setSyncStatus("err","Save failed — check connection");});
}
function scheduleSave(){
  if(_saveTimer)clearTimeout(_saveTimer);
  _saveTimer=setTimeout(gsSave,1500);
}
function startAutoRefresh(){
  setInterval(function(){
    if(document.hidden)return;
    gsLoad(function(ok){if(ok&&window._appRender)window._appRender();});
  },30000);
}
</script>
</head>
<body>
<div id="sync-bar"><span class="sync-pill sync-init"><span class="sync-dot"></span> Starting…</span></div>
<div id="toast"></div>
<div id="app"></div>
<div id="status-popup"></div>

<!-- ═══════════════════════════════════════════
     MAIN APPLICATION
═══════════════════════════════════════════ -->
<script>
/* ── CONSTANTS ── */
var CUR_YEAR=new Date().getFullYear();
var YEARS=(function(){var a=[];for(var y=2020;y<=CUR_YEAR+5;y++)a.push(y);return a;})();
var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
// All subtypes as a flat list (used for station initialisation loops)
var SUBTYPES=[
  "Hydrological Stations",
  "Snow Stations — RLS",
  "Snow Stations — AWS",
  "Snow Stations — Glacier Camera"
];
// Grouped structure for the dropdown display
var SUBTYPE_GROUPS=[
  {label:"Hydrological", options:["Hydrological Stations"]},
  {label:"Snow Stations", options:["Snow Stations — RLS","Snow Stations — AWS","Snow Stations — Glacier Camera"]}
];
var TYPES=["Manual+Automatic","Manual","Automatic"];
var MEDIUMS=["GSM","Satellite","N/A"];

// D (Discontinued) REMOVED — options are now A, I, F, -
var S_OPTS=["","A","I","F","-"];
var S_CLR={A:"#15803d",I:"#dc2626",D:"#7c3aed",F:"#c2410c","-":"#6b7280"};
var S_BG ={A:"#f0fdf4",I:"#fef2f2",D:"#faf5ff",F:"#fff7ed","-":"#f9fafb"};
var S_LBL={A:"Active",I:"Inactive",F:"Flooded Away","-":"Unchecked","":"Clear/Empty"};

/* ── DEFAULT STATIONS ── */
// No default stations — all stations are entered manually via ⚙ Manage Stations
var DEF_HYDRO=[];

/* ── AUTH ── */
var AUTH={
  loggedIn:false,user:null,
  captchaA:0,captchaB:0,
  loginUsername:"",loginPassword:"",loginCaptcha:"",loginError:""
};

function hashPwd(p){return btoa(encodeURIComponent(p+"_rlsdhm_2026"));}

function getUsers(){
  var u=lGet("rls_users");
  if(!u||!Array.isArray(u)||u.length===0){
    u=[{id:"u_admin",username:"admin",pwd:hashPwd("admin2024"),role:"admin",offices:[]}];
    lSet("rls_users",u);
  }
  return u;
}
function saveUsers(users){lSet("rls_users",users);}

function checkSession(){
  try{
    var sess=JSON.parse(sessionStorage.getItem("rls_session")||"null");
    if(sess&&sess.userId){
      var u=getUsers().find(function(x){return x.id===sess.userId;});
      if(u){AUTH.loggedIn=true;AUTH.user={id:u.id,username:u.username,role:u.role,offices:u.offices||[],subtypes:u.subtypes||[]};return true;}
    }
  }catch(e){}
  return false;
}

function doLogin(un,pw,cap){
  if(parseInt(cap)!==(AUTH.captchaA+AUTH.captchaB)){AUTH.loginError="Security check answer is wrong. Please try again.";return false;}
  var users=getUsers();
  var u=users.find(function(x){return x.username===un&&x.pwd===hashPwd(pw);});
  if(!u){AUTH.loginError="Invalid username or password.";return false;}
  AUTH.loggedIn=true;AUTH.user={id:u.id,username:u.username,role:u.role,offices:u.offices||[],subtypes:u.subtypes||[]};
  AUTH.loginError="";
  sessionStorage.setItem("rls_session",JSON.stringify({userId:u.id}));
  return true;
}

function doLogout(){
  AUTH.loggedIn=false;AUTH.user=null;AUTH.loginUsername="";AUTH.loginPassword="";
  AUTH.loginCaptcha="";AUTH.loginError="";
  sessionStorage.removeItem("rls_session");
  newCaptcha();renderLogin();
}

function newCaptcha(){
  AUTH.captchaA=Math.floor(Math.random()*9)+1;
  AUTH.captchaB=Math.floor(Math.random()*9)+1;
}

function getVisibleOffices(){
  var all=lGet("rls_offices")||["DHM"];
  if(!AUTH.user||AUTH.user.role==="admin")return all;
  return all.filter(function(o){return AUTH.user.offices.indexOf(o)>=0;});
}
function getVisibleSubtypes(){
  if(!AUTH.user||AUTH.user.role==="admin")return SUBTYPES;
  var allowed=AUTH.user.subtypes;
  if(!allowed||allowed.length===0)return SUBTYPES; // backward-compat: no restriction = all
  return SUBTYPES.filter(function(s){return allowed.indexOf(s)>=0;});
}

/* ── HELPERS ── */
function sk(s){return s.replace(/[^a-zA-Z0-9]/g,"_");}
function dim(m){return new Date(S.year,MONTHS.indexOf(m)+1,0).getDate();}
function SK(o,s){return "rls_stn_"+sk(o)+"_"+sk(s);}
function TK(o,s,m){return "rls_st_"+sk(o)+"_"+sk(s)+"_"+S.year+"_"+sk(m);}
function LK(o,s,y,m){return "rls_lock_"+sk(o)+"_"+sk(s)+"_"+y+"_"+sk(m);}
function lGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}if(typeof scheduleSave!=="undefined")scheduleSave();}
function lDel(k){try{localStorage.removeItem(k);}catch(e){}}

function isMonthLocked(month){
  return lGet(LK(S.office,S.subtype,S.year,month||S.month))===true;
}

/* ── STATE ── */
var S={
  offices:lGet("rls_offices")||["DHM","OHM Dharan"],
  office:"DHM",subtype:"Hydrological Stations",
  month:MONTHS[new Date().getMonth()],
  year:lGet("rls_year")||CUR_YEAR,
  stns:{},status:{},
  showManage:false,showAddOff:false,showDelOff:false,showUserMgmt:false,
  view:"status",
  newOff:"",newNo:"",newName:"",newElev:"",newType:"Manual+Automatic",newMed:"GSM",
  newUsr:{username:"",password:"",role:"dataentry",offices:{},subtypes:{}}
};

function initStns(){
  var allOff=lGet("rls_offices")||S.offices;
  S.offices=allOff;
  allOff.forEach(function(o){
    SUBTYPES.forEach(function(s){
      var k=SK(o,s);
      if(S.stns[k]===undefined){
        var saved=lGet(k);
        S.stns[k]=saved?saved:(o==="DHM"&&s==="Hydrological Stations"?JSON.parse(JSON.stringify(DEF_HYDRO)):[]);
      }
    });
  });
}

function loadStatus(){
  var k=TK(S.office,S.subtype,S.month);
  if(S.status[k]===undefined)S.status[k]=lGet(k)||{};
}

var _toastTimer=null;
function flash(msg,err){
  var t=document.getElementById("toast");if(!t)return;
  t.innerHTML='<div class="toast '+(err?"toast-err":"toast-ok")+'">'+(err?"⚠ ":"✓ ")+msg+'</div>';
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){t.innerHTML="";},2800);
}

/* ── STATUS OPERATIONS ── */
function setStatus(stnId,day,newVal,forMonth){
  var month=forMonth||S.month;
  if(isMonthLocked(month)){flash("🔒 Month is locked. Ask admin to unlock.",true);return;}
  var k=TK(S.office,S.subtype,month);
  if(!S.status[k])S.status[k]={};
  if(!S.status[k][stnId])S.status[k][stnId]={};
  var old=S.status[k][stnId][day]||"";
  // Confirmation when changing to/from A or I
  if(old&&old!==newVal&&(old==="A"||old==="I"||newVal==="A"||newVal==="I")){
    var oL=S_LBL[old]||old,nL=S_LBL[newVal]||"Clear";
    if(!confirm("⚠  Confirm Status Change\n\n  From: "+oL+"\n  To:   "+nL+"\n\n  Day "+day+" — "+month+"\n\nAre you sure you want to make this change?"))return;
  }
  if(newVal===""){delete S.status[k][stnId][day];}else{S.status[k][stnId][day]=newVal;}
  lSet(k,S.status[k]);
  render();
}

function getStnStats(id,forMonth){
  var month=forMonth||S.month;
  var k=TK(S.office,S.subtype,month);
  var st=(S.status[k]&&S.status[k][id])||{};
  var d=dim(month);var r={A:0,I:0,F:0};
  for(var day=1;day<=d;day++){var v=st[day]||"";if(r[v]!==undefined)r[v]++;}
  return r;
}

function getDayTotals(day,forMonth){
  var month=forMonth||S.month;
  var k=TK(S.office,S.subtype,month);
  var stns=S.stns[SK(S.office,S.subtype)]||[];
  var r={A:0,I:0,F:0,"-":0};
  stns.forEach(function(stn){
    var v=(S.status[k]&&S.status[k][stn.id]&&S.status[k][stn.id][day])||"";
    if(r[v]!==undefined)r[v]++;
  });
  return r;
}

/* ── STATUS POPUP ── */
function showStatusPopup(e,stnId,day,forMonth){
  e.stopPropagation();
  var month=forMonth||S.month;
  if(isMonthLocked(month)){flash("🔒 "+month+" is locked. Contact admin.",true);return;}
  var popup=document.getElementById("status-popup");
  var rect=e.currentTarget.getBoundingClientRect();
  popup.style.left=Math.min(rect.left,window.innerWidth-200)+"px";
  popup.style.top=Math.min(rect.bottom+4,window.innerHeight-230)+"px";
  popup.style.display="block";
  popup.innerHTML="";
  var k=TK(S.office,S.subtype,month);
  var cur=(S.status[k]&&S.status[k][stnId]&&S.status[k][stnId][day])||"";
  var title=document.createElement("div");
  title.className="sp-title";
  title.textContent=month+" · Day "+day;
  popup.appendChild(title);
  var opts=[
    {v:"A",label:"Active",    color:"#15803d",bg:"#f0fdf4"},
    {v:"I",label:"Inactive",  color:"#dc2626",bg:"#fef2f2"},
    {v:"F",label:"Flooded Away",color:"#c2410c",bg:"#fff7ed"},
    {v:"-",label:"Unchecked", color:"#6b7280",bg:"#f9fafb"},
    {v:"", label:"Clear",     color:"#94a3b8",bg:"#ffffff"}
  ];
  opts.forEach(function(opt){
    var row=document.createElement("div");
    var isCur=cur===opt.v;
    row.className="sp-opt";
    row.style.background=isCur?opt.bg:"#fff";
    var dot=document.createElement("span");dot.className="sp-dot";dot.style.background=opt.v?opt.color:"#e2e8f0";
    var chk=document.createElement("span");chk.className="sp-chk";chk.textContent=isCur?"✓":"";
    var lbl=document.createElement("span");
    lbl.style.cssText="color:"+opt.color+";font-weight:"+(isCur?"bold":"normal");
    lbl.innerHTML=opt.v?"<b>"+opt.v+"</b> — "+opt.label:"∅ Clear";
    row.appendChild(dot);row.appendChild(chk);row.appendChild(lbl);
    row.onmouseover=function(){this.style.background=opt.bg;};
    row.onmouseout=function(){this.style.background=isCur?opt.bg:"#fff";};
    row.onclick=(function(o,m){return function(ev){
      ev.stopPropagation();
      setStatus(stnId,day,o,m);
      popup.style.display="none";
    };})(opt.v,month);
    popup.appendChild(row);
  });
}

document.addEventListener("click",function(){
  var p=document.getElementById("status-popup");if(p)p.style.display="none";
});

/* ── LOCK / UNLOCK ── */
function lockMonth(){
  var k=TK(S.office,S.subtype,S.month);
  var curSt=S.status[k]||lGet(k)||{};
  var stns=S.stns[SK(S.office,S.subtype)]||[];
  var days=dim(S.month);

  // Check for empty/unchecked days per station
  var missing=[];
  stns.forEach(function(stn){
    var stnSt=curSt[stn.id]||{};
    var emptyDays=[];
    for(var d=1;d<=days;d++){
      var v=stnSt[d];
      if(!v||v==="")emptyDays.push(d);
    }
    if(emptyDays.length>0)missing.push({stn:stn,days:emptyDays});
  });

  if(missing.length===0){
    // All filled — simple confirm then lock
    if(!confirm("🔒 Lock "+S.month+" "+S.year+" for "+S.office+"?\n\nAll entries will be READ-ONLY.\nOnly Admin can unlock."))return;
    lSet(LK(S.office,S.subtype,S.year,S.month),true);
    flash(S.month+" "+S.year+" is now LOCKED 🔒");render();
    return;
  }

  // Build warning modal
  var overlay=document.createElement("div");
  overlay.className="lock-modal-overlay";

  var modal=document.createElement("div");
  modal.className="lock-modal";

  // Header
  var hdr=document.createElement("div");hdr.className="lock-modal-hdr";
  hdr.innerHTML='<span class="icon">⚠️</span><div><div class="ttl">Incomplete Entries Detected</div>'+
    '<div class="sub">'+S.month+' '+S.year+' · '+S.office+'</div></div>';

  // Body
  var body=document.createElement("div");body.className="lock-modal-body";
  var intro=document.createElement("div");intro.className="lock-warn-intro";
  intro.innerHTML='<b>'+missing.length+' station'+(missing.length>1?'s have':'has')+' unfilled days</b> in '+
    S.month+'. Locking will make these permanently read-only until an Admin unlocks the month.';
  body.appendChild(intro);

  var tbl=document.createElement("table");tbl.className="miss-table";
  tbl.innerHTML='<thead><tr><th>#</th><th>Station No.</th><th>Name / River</th>'+
    '<th>Missing Days</th><th style="text-align:center">Count</th></tr></thead>';
  var tb=document.createElement("tbody");
  missing.forEach(function(m,i){
    var dStr=m.days.length<=10?m.days.join(", "):m.days.slice(0,10).join(", ")+"… ("+m.days.length+" total)";
    var tr=document.createElement("tr");
    tr.innerHTML='<td style="color:#94a3b8">'+(i+1)+'</td>'+
      '<td style="font-family:monospace">'+m.stn.no+'</td>'+
      '<td>'+m.stn.name+'</td>'+
      '<td class="miss-days">'+dStr+'</td>'+
      '<td style="text-align:center;font-weight:bold;color:#dc2626">'+m.days.length+'</td>';
    tb.appendChild(tr);
  });
  tbl.appendChild(tb);body.appendChild(tbl);

  // Footer
  var foot=document.createElement("div");foot.className="lock-modal-foot";
  var note=document.createElement("div");note.className="warn-note";
  note.textContent="⚠ You can go back and fill the missing entries, or lock anyway.";

  var cancelB=document.createElement("button");cancelB.className="btn-lock-cancel";
  cancelB.textContent="← Go Back & Fill";
  cancelB.onclick=function(){overlay.remove();};

  var forceB=document.createElement("button");forceB.className="btn-lock-force";
  forceB.textContent="🔒 Lock Anyway";
  forceB.onclick=function(){
    overlay.remove();
    lSet(LK(S.office,S.subtype,S.year,S.month),true);
    flash(S.month+" "+S.year+" is now LOCKED 🔒 (with missing entries)");render();
  };

  foot.appendChild(note);foot.appendChild(cancelB);foot.appendChild(forceB);
  modal.appendChild(hdr);modal.appendChild(body);modal.appendChild(foot);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  // Click outside to cancel
  overlay.addEventListener("click",function(e){if(e.target===overlay)overlay.remove();});
}
function unlockMonth(){
  if(!AUTH.user||AUTH.user.role!=="admin"){flash("Only Admin can unlock a month.",true);return;}
  if(!confirm("🔓 Unlock "+S.month+" "+S.year+" for "+S.office+"?\n\nEntries will become editable again."))return;
  lSet(LK(S.office,S.subtype,S.year,S.month),false);
  flash(S.month+" "+S.year+" unlocked 🔓");render();
}

/* ── STATION OPS ── */
function addStation(){
  if(!AUTH.user){flash("You must be logged in to add stations.",true);return;}
  var no=S.newNo.trim(),name=S.newName.trim();
  if(!no||!name){flash("Enter station number and name",true);return;}
  var k=SK(S.office,S.subtype);
  var stn={id:"s"+Date.now(),no:no,name:name,elev:S.newElev.trim(),type:S.newType,medium:S.newMed};
  S.stns[k]=(S.stns[k]||[]).concat([stn]);lSet(k,S.stns[k]);
  S.newNo="";S.newName="";S.newElev="";flash('Station "'+name+'" added');render();
}
function deleteStation(id){
  if(!AUTH.user){flash("You must be logged in to remove stations.",true);return;}
  var k=SK(S.office,S.subtype);
  S.stns[k]=(S.stns[k]||[]).filter(function(s){return s.id!==id;});lSet(k,S.stns[k]);
  flash("Station removed");render();
}
function editStation(id){
  if(!AUTH.user){flash("You must be logged in to edit stations.",true);return;}
  var k=SK(S.office,S.subtype);
  var stns=S.stns[k]||[];
  var stn=stns.find(function(s){return s.id===id;});
  if(!stn)return;
  // Toggle: clicking edit again closes the row
  var existing=document.getElementById("edit-row-"+id);
  if(existing){existing.remove();return;}

function addOffice(){
  if(!AUTH.user||AUTH.user.role!=="admin"){flash("Only Admin can add offices.",true);return;}
  var name=S.newOff.trim();if(!name)return;
  var allOff=lGet("rls_offices")||S.offices;
  if(allOff.indexOf(name)>=0){flash("Office already exists",true);return;}
  allOff.push(name);lSet("rls_offices",allOff);S.offices=allOff;
  SUBTYPES.forEach(function(s){S.stns[SK(name,s)]=[];});
  S.office=name;S.newOff="";S.showAddOff=false;S.showDelOff=false;
  flash('Office "'+name+'" added');render();
}
function deleteOffice(name){
  if(!AUTH.user||AUTH.user.role!=="admin"){flash("Only Admin can delete offices.",true);return;}
  if(name==="DHM"){flash("Cannot delete the default DHM office",true);return;}
  if(!confirm('Delete office "'+name+'"?\nAll its stations and status data will be removed.'))return;
  SUBTYPES.forEach(function(s){
    lDel(SK(name,s));delete S.stns[SK(name,s)];
    MONTHS.forEach(function(m){lDel(TK(name,s,m));});
  });
  var allOff=(lGet("rls_offices")||S.offices).filter(function(o){return o!==name;});
  lSet("rls_offices",allOff);S.offices=allOff;
  if(S.office===name)S.office=allOff[0];
  S.showDelOff=false;flash('Office "'+name+'" deleted');render();
}

function updateUserOffices(id,checkEl,office){
  var users=getUsers();
  var u=users.find(function(x){return x.id===id;});
  if(!u)return;
  if(checkEl.checked){if(u.offices.indexOf(office)<0)u.offices.push(office);}
  else{u.offices=u.offices.filter(function(o){return o!==office;});}
  saveUsers(users);flash("Offices updated");
}
function updateUserSubtypes(id,checkEl,subtype){
  var users=getUsers();
  var u=users.find(function(x){return x.id===id;});
  if(!u)return;
  if(!u.subtypes)u.subtypes=[];
  if(checkEl.checked){if(u.subtypes.indexOf(subtype)<0)u.subtypes.push(subtype);}
  else{u.subtypes=u.subtypes.filter(function(s){return s!==subtype;});}
  saveUsers(users);flash("Station type access updated");
}

/* ── DOM BUILDER ── */
function el(tag,attrs,children){
  var elem=document.createElement(tag);
  if(attrs){
    if(Array.isArray(attrs)){children=attrs;attrs=null;}
    else{
      Object.keys(attrs).forEach(function(k){
        if(k==="cls")elem.className=attrs[k];
        else if(k==="style")elem.style.cssText=attrs[k];
        else if(k==="onclick")elem.onclick=attrs[k];
        else if(k==="onchange")elem.onchange=attrs[k];
        else if(k==="oninput")elem.oninput=attrs[k];
        else if(k==="onkeydown")elem.onkeydown=attrs[k];
        else elem.setAttribute(k,attrs[k]);
      });
    }
  }
  if(children){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c==null)return;
      if(typeof c==="string"||typeof c==="number")elem.appendChild(document.createTextNode(String(c)));
      else elem.appendChild(c);
    });
  }
  return elem;
}
function txt(s){return document.createTextNode(s);}
function pwWrap(inp){
  /* Wraps a password <input> in a relative container with an eye-toggle button */
  var wrap=document.createElement("div");wrap.className="pw-wrap";
  var btn=document.createElement("button");btn.type="button";btn.className="pw-eye";
  btn.title="Show / hide password";
  btn.innerHTML="&#128065;"; // 👁
  btn.onclick=function(){
    var show=inp.type==="password";
    inp.type=show?"text":"password";
    btn.innerHTML=show?"&#128065;&#x20D7;":"&#128065;";
    btn.title=show?"Hide password":"Show password";
    inp.focus();
  };
  wrap.appendChild(inp);wrap.appendChild(btn);
  return wrap;
}
function mkSel(opts,val,cls,onchange){
  var s=el("select",{cls:cls,onchange:onchange});
  opts.forEach(function(o){
    var v=typeof o==="object"?o.value:o,l=typeof o==="object"?o.label:o;
    var op=el("option",{value:v},[l]);if(v===val)op.selected=true;s.appendChild(op);
  });
  return s;
}

// Grouped subtype selector — shows optgroups for Snow Stations
function mkSubtypeSel(val,onchange){
  var s=document.createElement("select");
  s.className="hdr-sel";s.onchange=onchange;
  SUBTYPE_GROUPS.forEach(function(grp){
    if(grp.options.length===1){
      // Single option — no optgroup needed
      var op=document.createElement("option");
      op.value=grp.options[0];op.textContent=grp.options[0];
      if(grp.options[0]===val)op.selected=true;
      s.appendChild(op);
    }else{
      var og=document.createElement("optgroup");
      og.label=grp.label;
      grp.options.forEach(function(o){
        var op=document.createElement("option");
        op.value=o;
        op.textContent=o;
        if(o===val)op.selected=true;
        og.appendChild(op);
      });
      s.appendChild(og);
    }
  });
  return s;
}

/* ── BUILD MONTH SECTION (for Annual Summary) ── */
function buildMonthSection(month,stns){
  var k=TK(S.office,S.subtype,month);
  if(S.status[k]===undefined)S.status[k]=lGet(k)||{};
  var d=dim(month);
  var locked=isMonthLocked(month);
  var section=el("div",{cls:"sum-section"});
  section.appendChild(el("div",{cls:"sum-sec-hdr"},[
    el("span",[month+" "+S.year]),
    el("span",{style:"font-size:10px;opacity:.75"},[d+" days"+(locked?" · 🔒":"")])
  ]));
  var tbl=el("table",{cls:"sum-month"});
  // Header
  var hr=el("tr");
  hr.appendChild(el("th",{cls:"tleft",style:"width:20px"},["#"]));
  hr.appendChild(el("th",{cls:"tleft",style:"min-width:100px"},["Station"]));
  for(var i=1;i<=d;i++)hr.appendChild(el("th",[String(i)]));
  hr.appendChild(el("th",{style:"color:#4ade80"},["A"]));
  hr.appendChild(el("th",{style:"color:#f87171"},["I"]));
  hr.appendChild(el("th",{style:"color:#fb923c"},["F"]));
  tbl.appendChild(el("thead",[hr]));
  // Body
  var tbody=el("tbody");
  stns.forEach(function(stn,idx){
    var stnSt=(S.status[k]&&S.status[k][stn.id])||{};
    var tr=el("tr");
    tr.appendChild(el("td",{style:"text-align:center;color:#94a3b8;padding:2px 3px"},[String(idx+1)]));
    var nc=el("td",{style:"padding:2px 6px;white-space:nowrap;overflow:hidden;max-width:100px;font-size:10px"});
    nc.title=stn.name+" ("+stn.no+")";nc.textContent=stn.no+" "+stn.name;tr.appendChild(nc);
    var cnt={A:0,I:0,F:0};
    for(var day=1;day<=d;day++){
      (function(dy){
        var v=stnSt[dy]||"";
        var td=el("td",{cls:"mtick"});
        if(v&&S_BG[v]){td.style.background=S_BG[v];td.style.color=S_CLR[v];td.textContent=v;if(cnt[v]!==undefined)cnt[v]++;}
        td.title=month+" Day "+dy+(v?" : "+(S_LBL[v]||v):" : empty");
        if(!locked){(function(id,m){td.onclick=function(e){showStatusPopup(e,id,dy,m);};})(stn.id,month);}
        else{td.style.cursor="not-allowed";td.title+=" [LOCKED]";}
        tr.appendChild(td);
      })(day);
    }
    tr.appendChild(el("td",{cls:"mcnt",style:"color:#15803d"},[cnt.A||""]));
    tr.appendChild(el("td",{cls:"mcnt",style:"color:#dc2626"},[cnt.I||""]));
    tr.appendChild(el("td",{cls:"mcnt",style:"color:#c2410c"},[cnt.F||""]));
    tbody.appendChild(tr);
  });
  // Footer: day totals
  var fr=el("tr");
  fr.appendChild(el("td",{style:"background:#dce7f0"},[""]));
  fr.appendChild(el("td",{style:"background:#dce7f0;font-weight:bold;padding:2px 6px;font-size:9px;color:#1a3558"},["Day Total"]));
  for(var day=1;day<=d;day++){
    var dt={A:0,I:0,F:0};
    stns.forEach(function(stn){var v=(S.status[k]&&S.status[k][stn.id]&&S.status[k][stn.id][day])||"";if(dt[v]!==undefined)dt[v]++;});
    var tdF=el("td",{style:"text-align:center;background:#dce7f0;font-size:9px"});
    var dom="A",mx=0;
    Object.keys(dt).forEach(function(c){if(dt[c]>mx){mx=dt[c];dom=c;}});
    if(mx>0){tdF.style.color=S_CLR[dom];tdF.style.fontWeight="bold";tdF.textContent=String(mx);}
    fr.appendChild(tdF);
  }
  fr.appendChild(el("td",{style:"background:#dce7f0"},[""]));
  fr.appendChild(el("td",{style:"background:#dce7f0"},[""]));
  fr.appendChild(el("td",{style:"background:#dce7f0"},[""]));
  tbl.appendChild(tbody);tbl.appendChild(el("tfoot",[fr]));
  section.appendChild(el("div",{cls:"sum-sec-body"},[tbl]));
  return section;
}

  if(visOff.indexOf(S.office)<0)S.office=visOff[0]||"DHM";

  var stns=S.stns[SK(S.office,S.subtype)]||[];
  var curK=TK(S.office,S.subtype,S.month);var curSt=S.status[curK]||{};
  var days=dim(S.month);var locked=isMonthLocked();
  var isAdmin=AUTH.user.role==="admin";

  var app=document.getElementById("app");app.innerHTML="";

  /* ── HEADER ── */
  var headerChildren=[
    el("div",{cls:"header-title",style:"cursor:pointer",title:"Go to Daily Status",onclick:function(){S.view="status";S.showManage=false;S.showUserMgmt=false;render();}},["🌊  DHM RLS Station Daily Status Register"]),
    el("div",{cls:"header-row"},[
      el("div",{cls:"ctrl"},[el("span",{cls:"ctrl-lbl"},["Year:"]),
        mkSel(YEARS.map(String),String(S.year),"hdr-sel",function(){S.year=parseInt(this.value);S.status={};lSet("rls_year",S.year);render();})
      ]),
      el("div",{cls:"ctrl"},[el("span",{cls:"ctrl-lbl"},["Office:"]),
        mkSel(visOff,S.office,"hdr-sel",function(){S.office=this.value;render();}),
        isAdmin?el("button",{cls:"hdr-btn"+(S.showAddOff?" hdr-btn-active":""),onclick:function(){S.showAddOff=!S.showAddOff;S.showDelOff=false;render();}},["+ Add"]):null,
        isAdmin?el("button",{cls:"hdr-btn hdr-btn-red"+(S.showDelOff?" hdr-btn-active":""),onclick:function(){S.showDelOff=!S.showDelOff;S.showAddOff=false;render();}},["🗑"]):null
      ]),
      el("div",{cls:"ctrl"},[el("span",{cls:"ctrl-lbl"},["Sub-type:"]),
        (function(){
          var visSub=getVisibleSubtypes();
          // If current subtype not accessible, reset to first visible
          if(visSub.indexOf(S.subtype)<0)S.subtype=visSub[0]||SUBTYPES[0];
          var s=document.createElement("select");s.className="hdr-sel";
          s.onchange=function(){S.subtype=this.value;render();};
          SUBTYPE_GROUPS.forEach(function(grp){
            var visOpts=grp.options.filter(function(o){return visSub.indexOf(o)>=0;});
            if(visOpts.length===0)return;
            if(visOpts.length===1){
              var op=document.createElement("option");op.value=visOpts[0];op.textContent=visOpts[0];
              if(visOpts[0]===S.subtype)op.selected=true;s.appendChild(op);
            }else{
              var og=document.createElement("optgroup");og.label=grp.label;
              visOpts.forEach(function(o){
                var op=document.createElement("option");op.value=o;op.textContent=o;
                if(o===S.subtype)op.selected=true;og.appendChild(op);
              });
              s.appendChild(og);
            }
          });
          return s;
        })()
      ]),
      el("div",{cls:"ctrl"},[el("span",{cls:"ctrl-lbl"},["Month:"]),
        mkSel(MONTHS,S.month,"hdr-sel",function(){S.month=this.value;render();})
      ]),
      S.view==="status"?(
        locked
          ?el("button",{cls:"hdr-btn hdr-btn-locked",onclick:isAdmin?unlockMonth:function(){flash("Only Admin can unlock",true);}},["🔒 "+(isAdmin?"Click to Unlock":"Locked")])
          :el("button",{cls:"hdr-btn hdr-btn-lock",onclick:lockMonth},["🔒 Lock Month"])
      ):null,
      el("button",{cls:"manage-btn"+(S.showManage?" active":""),onclick:function(){S.showManage=!S.showManage;if(isAdmin)S.showUserMgmt=false;render();}},["⚙ Stations ("+stns.length+")"]),
      isAdmin?el("button",{cls:"manage-btn"+(S.showUserMgmt?" active":""),onclick:function(){S.showUserMgmt=!S.showUserMgmt;S.showManage=false;render();}},["👥 Users"]):null,
      el("div",{cls:"user-pill"},[
        txt("👤 "+AUTH.user.username),
        el("span",{style:"font-size:9px;opacity:.65;margin-left:2px"},[" · "+(AUTH.user.role==="admin"?"Admin":"Data Entry")]),
        el("button",{cls:"logout-btn",onclick:doLogout},["Sign Out"])
      ])
    ])
  ];

  // Add/Delete Office panels
  if(S.showAddOff&&isAdmin){
    var offInp=el("input",{type:"text",placeholder:"New office name (e.g. OHM Surkhet)",value:S.newOff,
      oninput:function(){S.newOff=this.value;},
      onkeydown:function(e){if(e.key==="Enter")addOffice();}});
    headerChildren.push(el("div",{cls:"sub-panel"},[
      el("div",{cls:"sub-panel-row"},[offInp,el("button",{cls:"btn-add",onclick:addOffice},["Add"]),
        el("button",{cls:"btn-x",onclick:function(){S.showAddOff=false;S.newOff="";render();}},["✕"])])
    ]));
    setTimeout(function(){offInp.focus();},10);
  }
  if(S.showDelOff&&isAdmin){
    var delRows=S.offices.map(function(o){
      var nEl=el("span",{cls:"del-row-name"+(o===S.office?" current":"")},[o+(o===S.office?" (current)":"")]);
      var aEl;
      if(o==="DHM")aEl=el("span",{cls:"protected-lbl"},["default — cannot delete"]);
      else(function(nm){aEl=el("button",{cls:"btn-del-off",onclick:function(){deleteOffice(nm);}},["Delete"]);})(o);
      return el("div",{cls:"del-row"},[nEl,aEl]);
    });
    headerChildren.push(el("div",{cls:"del-panel"},[el("div",{cls:"del-panel-info"},["Select office to delete. All its stations and data will be removed."])].concat(delRows)));
  }
  app.appendChild(el("div",{cls:"header"},headerChildren));

  // User management panel
  if(S.showUserMgmt&&isAdmin)renderUserPanel(app);

  // Tabs
  app.appendChild(el("div",{cls:"tabs"},[
    el("button",{cls:"tab"+(S.view==="status"?" active":""),onclick:function(){S.view="status";render();}},["📋 Daily Status"]),
    el("button",{cls:"tab"+(S.view==="summary"?" active":""),onclick:function(){S.view="summary";render();}},["📊 Annual Summary"])
  ]));

  if(S.view==="summary"){
    renderSummary(app);
    app.appendChild(el("div",{cls:"footer"},[
      el("span",["Annual summary · Changes auto-saved"]),
      el("span",[S.office+" · "+S.subtype+" · "+S.year])
    ]));
    app.appendChild(el("div",{cls:"dev-footer"},["Developed by: Avishek Pokhrel, Hydrologist, DHM"]));
    return;
  }

  /* ── MANAGE STATIONS PANEL ── */
  if(S.showManage){
    var noInp=el("input",{type:"text",placeholder:"e.g. 610",value:S.newNo,style:"width:72px",oninput:function(){S.newNo=this.value;}});
    var nameInp=el("input",{type:"text",placeholder:"Station or river name",value:S.newName,
      oninput:function(){S.newName=this.value;},onkeydown:function(e){if(e.key==="Enter")addStation();}});
    var elevInp=el("input",{type:"number",placeholder:"e.g. 1340",value:S.newElev,style:"width:80px",oninput:function(){S.newElev=this.value;}});
    var typeSel=mkSel(TYPES,S.newType,"",function(){S.newType=this.value;});
    var medSel=mkSel(MEDIUMS,S.newMed,"",function(){S.newMed=this.value;});
    var listEl;
    if(stns.length===0){listEl=el("div",{cls:"empty-note"},["No stations yet."]);}
    else{
      var stbody=el("tbody");
      stns.forEach(function(stn,i){
        (function(s){
          var tr=el("tr");
          tr.setAttribute("data-stn-id",s.id);
          tr.appendChild(el("td",{style:"text-align:center;color:#94a3b8;font-size:11px"},[String(i+1)]));
          tr.appendChild(el("td",{style:"text-align:center;font-family:monospace;font-size:11px"},[s.no]));
          tr.appendChild(el("td",[s.name]));
          tr.appendChild(el("td",{style:"text-align:center;color:#64748b;font-size:11px"},[s.elev||""]));
          tr.appendChild(el("td",{style:"text-align:center;color:#64748b;font-size:11px"},[s.type]));
          tr.appendChild(el("td",{style:"text-align:center;color:#64748b;font-size:11px"},[s.medium]));
          tr.appendChild(el("td",{style:"text-align:center"},[
            el("div",{cls:"stn-actions"},[
              el("button",{cls:"btn-edit",onclick:function(){editStation(s.id);},title:"Edit station"},["✏ edit"]),
              el("button",{cls:"btn-rm",onclick:function(){deleteStation(s.id);}},["✕ remove"])
            ])
          ]));
          stbody.appendChild(tr);
        })(stn);
      });
      listEl=el("div",{cls:"stn-list"},[
        el("table",[
          el("thead",[el("tr",[
            el("th",{style:"text-align:center"},["#"]),
            el("th",{style:"text-align:center"},["No."]),
            el("th",{style:"text-align:left"},["Name / River"]),
            el("th",{style:"text-align:center"},["Elev (m)"]),
            el("th",{style:"text-align:center"},["Type"]),
            el("th",{style:"text-align:center"},["Medium"]),
            el("th",["Actions"])
          ])]),
          stbody
        ])
      ]);
    }
    app.appendChild(el("div",{cls:"manage-panel"},[
      el("div",{cls:"manage-title"},[txt("Stations for: "),el("span",{cls:"off"},[S.office]),txt(" / "),el("span",{cls:"sub"},[S.subtype])]),
      el("div",{cls:"stn-form"},[
        el("div",{cls:"fld"},[el("label",[txt("Station No.")]),noInp]),
        el("div",{cls:"fld fld-grow"},[el("label",[txt("Name / River")]),nameInp]),
        el("div",{cls:"fld"},[el("label",[txt("Elevation (m)")]),elevInp]),
        el("div",{cls:"fld"},[el("label",[txt("Type")]),typeSel]),
        el("div",{cls:"fld"},[el("label",[txt("Comm. Medium")]),medSel]),
        el("button",{cls:"btn-stn-add",onclick:addStation},["+ Add & Save"])
      ]),listEl
    ]));
    setTimeout(function(){noInp.focus();},10);
  }

  /* ── LEGEND ── */
  var legItems=[{v:"A",l:"Active"},{v:"I",l:"Inactive"},{v:"F",l:"Flooded Away"},{v:"-",l:"Unchecked"}].map(function(p){
    return el("span",{cls:"leg-item"},[el("span",{cls:"leg-code",style:"color:"+S_CLR[p.v]},[p.v]),el("span",{style:"color:#64748b"},[" = "+p.l])]);
  });
  legItems.push(el("span",{cls:"leg-hint"},["Click any day cell → select status from dropdown"]));
  // If locked, add a small lock tag to the legend bar instead of a big banner
  if(locked){
    var lockTag=el("span",{cls:"lock-tag"},[txt("🔒 "+S.month+" Locked")]);
    if(isAdmin){
      var ulnk=el("span",{cls:"unlock-lnk",onclick:unlockMonth},["Unlock"]);
      lockTag.appendChild(ulnk);
    }
    legItems.push(lockTag);
  }
  app.appendChild(el("div",{cls:"legend"},legItems));

  /* ── STATUS TABLE ── */
  var thead=el("thead");
  var sRow=el("tr");
  [["S.N.",""],["Stn No.",""],["Name / River","tleft"],["Elev (m)",""],["Station Type",""],["Medium",""]].forEach(function(h){sRow.appendChild(el("th",{cls:h[1]},[h[0]]));});
  for(var d=1;d<=days;d++)sRow.appendChild(el("th",[String(d)]));
  for(var d=days+1;d<=31;d++)sRow.appendChild(el("th",{cls:"dim"},[String(d)]));
  sRow.appendChild(el("th",{cls:"dark"},["Active"]));
  sRow.appendChild(el("th",{cls:"dark"},["Inactive"]));
  thead.appendChild(sRow);

  // Body
  var tbody=el("tbody");
  if(stns.length===0){
    var noTd=el("td",{cls:"no-stn"},["No stations for "+S.office+" / "+S.subtype+". Open ⚙ Manage Stations to add them."]);
    noTd.setAttribute("colspan","40");
    tbody.appendChild(el("tr",[noTd]));
  }else{
    stns.forEach(function(stn,i){
      var stats=getStnStats(stn.id);
      var stnSt=curSt[stn.id]||{};
      var tr=el("tr");
      tr.appendChild(el("td",{style:"text-align:center;color:#94a3b8;padding:3px 4px;border-right:1px solid #e2e8f0"},[String(i+1)]));
      tr.appendChild(el("td",{style:"text-align:center;font-family:monospace;padding:3px 4px;border-right:1px solid #e2e8f0"},[stn.no]));
      tr.appendChild(el("td",{style:"text-align:left;padding-left:8px;border-right:1px solid #e2e8f0;overflow:hidden;white-space:nowrap;max-width:168px"},[stn.name]));
      tr.appendChild(el("td",{style:"text-align:center;font-size:10px;color:#64748b;padding:3px 4px;border-right:1px solid #e2e8f0"},[stn.elev||""]));
      tr.appendChild(el("td",{style:"text-align:center;font-size:10px;color:#64748b;padding:3px 4px;border-right:1px solid #e2e8f0"},[stn.type]));
      tr.appendChild(el("td",{style:"text-align:center;font-size:10px;padding:3px 4px;border-right:1px solid #e2e8f0"},[stn.medium]));
      // Day columns
      for(var d=1;d<=31;d++){
        (function(day){
          var v=stnSt[day]||"",active=day<=days;
          var tdCls="day"+(active&&locked?" dlocked":"");
          if(!active)tdCls="grayed";
          var td=el("td",{cls:tdCls});
          if(active){
            if(v){td.style.background=S_BG[v];td.style.color=S_CLR[v];td.textContent=v;}
            else{td.style.color="#dde3ea";}
            td.title=S.month+" Day "+day+(v?" : "+(S_LBL[v]||v):"");
            if(!locked)(function(id,dy,m){td.onclick=function(e){showStatusPopup(e,id,dy,m);};})(stn.id,day,S.month);
          }
          tr.appendChild(td);
        })(d);
      }
      tr.appendChild(el("td",{cls:"active-days"},[stats.A?String(stats.A):""]));
      tr.appendChild(el("td",{cls:"inactive-days"},[stats.I?String(stats.I):""]));
      tbody.appendChild(tr);
    });
  }

  // Footer totals
  var tfoot=el("tfoot");
  if(stns.length>0){
    var fRows=[["Active (A)","#15803d","A"],["Inactive (I)","#dc2626","I"],["Flooded Away (F)","#c2410c","F"],["Unchecked (-)","#6b7280","-"],["Total","#1a3558","total"]];
    fRows.forEach(function(row,ri){
      var label=row[0],color=row[1],key=row[2];
      var tr=el("tr",{cls:ri===4?"total":""});
      var lbl=el("td",{cls:"flbl",style:"color:"+color},[label]);lbl.setAttribute("colspan","6");tr.appendChild(lbl);
      for(var d=1;d<=days;d++){
        var t=getDayTotals(d);
        var v=key==="total"?(t.A+t.I+t.F+t["-"]):(t[key]||0);
        tr.appendChild(el("td",{style:"text-align:center;padding:3px 4px;border-right:1px solid #e2e8f0;font-size:11px;"+(v?"font-weight:bold;color:"+color:"color:#dde3ea")},[v?String(v):""]));
      }
      for(var d=days+1;d<=31;d++)tr.appendChild(el("td",{cls:"grayed"}));
      var et=el("td");et.setAttribute("colspan","2");tr.appendChild(et);
      tfoot.appendChild(tr);
    });
  }

  var tbl=el("table",{cls:"status"});
  tbl.style.minWidth=(493+days*26)+"px";
  var cg=el("colgroup");
  [32,58,168,60,120,55].forEach(function(w){var c=el("col");c.style.width=w+"px";cg.appendChild(c);});
  for(var ci=0;ci<31;ci++){var c=el("col");c.style.width="26px";cg.appendChild(c);}
  [46,46].forEach(function(w){var c=el("col");c.style.width=w+"px";cg.appendChild(c);});
  tbl.appendChild(cg);tbl.appendChild(thead);tbl.appendChild(tbody);tbl.appendChild(tfoot);
  app.appendChild(el("div",{cls:"tbl-wrap"},[tbl]));

  app.appendChild(el("div",{cls:"footer"},[
    el("span",["Changes auto-saved to browser storage"+(locked?" · 🔒 Month Locked":"")]),
    el("span",[S.office+" · "+S.subtype+" · "+S.month+" "+S.year+" · "+stns.length+" station"+(stns.length!==1?"s":"")])
  ]));
  app.appendChild(el("div",{cls:"dev-footer"},["Developed by: Avishek Pokhrel, Hydrologist, DHM"]));
}

/* ── INIT ── */
window._appRender=render;
newCaptcha();
if(checkSession()){
  if(typeof gsLoad!=="undefined"){
    gsLoad(function(){render();if(typeof startAutoRefresh!=="undefined")startAutoRefresh();});
  }else{render();}
}else{
  renderLogin();
}
</script>
</body>
</html>
