<script>
var GS_URL="https://script.google.com/macros/s/AKfycbwRW9euFRs7xUtoxJqpqRjeqAjjPZVPrSsp9qT4kQVeXIn3_tI81QZvI91QklI1ZHKeqw/exec";
var _saveTimer=null,_lastSaved=null;

function setSyncStatus(type,msg){
  var bar=document.getElementById("sync-bar");
  if(!bar)return;
  var cls={ok:"sync-ok",save:"sync-save",err:"sync-err",init:"sync-init"}[type]||"sync-init";
  bar.innerHTML='<span class="sync-pill '+cls+'"><span class="sync-dot"></span> '+msg+'</span>';
}
function gsLoad(cb){
  setSyncStatus("init","Loading data…");
  fetch(GS_URL,{method:"GET"})
  .then(function(r){return r.json();})
  .then(function(data){
    if(data&&typeof data==="object"){
      Object.keys(data).forEach(function(k){
        try{localStorage.setItem(k,JSON.stringify(data[k]));}catch(e){}
      });
      setSyncStatus("ok","Loaded ✓");
    }
    if(cb)cb(true);
  })
  .catch(function(){setSyncStatus("err","Load failed — using local data");if(cb)cb(false);});
}
function gsSave(){
  var payload={};
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.indexOf("rls")===0){
      try{payload[k]=JSON.parse(localStorage.getItem(k));}catch(e){payload[k]=localStorage.getItem(k);}
    }
  }
  var json=JSON.stringify(payload);
  if(json===_lastSaved)return;
  _lastSaved=json;
  setSyncStatus("save","Saving…");
  fetch(GS_URL,{method:"POST",body:json})
  .then(function(r){return r.text();})
  .then(function(){setSyncStatus("ok","Saved to Google Sheet ✓");})
  .catch(function(){setSyncStatus("err","Save failed — check connection");});
}
function scheduleSave(){
  if(_saveTimer)clearTimeout(_saveTimer);
  _saveTimer=setTimeout(gsSave,1500);
}
function startAutoRefresh(){
  setInterval(function(){
    if(document.hidden)return;
    gsLoad(function(ok){if(ok&&window._appRender)window._appRender();});
  },30000);
}
</script>

/* ── AUTH ── */
var AUTH={
  loggedIn:false,user:null,
  captchaA:0,captchaB:0,
  loginUsername:"",loginPassword:"",loginCaptcha:"",loginError:""
};

function hashPwd(p){return btoa(encodeURIComponent(p+"_rlsdhm_2026"));}

function getUsers(){
  var u=lGet("rls_users");
  if(!u||!Array.isArray(u)||u.length===0){
    u=[{id:"u_admin",username:"admin",pwd:hashPwd("admin2024"),role:"admin",offices:[]}];
    lSet("rls_users",u);
  }
  return u;
}
function saveUsers(users){lSet("rls_users",users);}

function checkSession(){
  try{
    var sess=JSON.parse(sessionStorage.getItem("rls_session")||"null");
    if(sess&&sess.userId){
      var u=getUsers().find(function(x){return x.id===sess.userId;});
      if(u){AUTH.loggedIn=true;AUTH.user={id:u.id,username:u.username,role:u.role,offices:u.offices||[]};return true;}
    }
  }catch(e){}
  return false;
}

function doLogin(un,pw,cap){
  if(parseInt(cap)!==(AUTH.captchaA+AUTH.captchaB)){AUTH.loginError="Security check answer is wrong. Please try again.";return false;}
  var users=getUsers();
  var u=users.find(function(x){return x.username===un&&x.pwd===hashPwd(pw);});
  if(!u){AUTH.loginError="Invalid username or password.";return false;}
  AUTH.loggedIn=true;AUTH.user={id:u.id,username:u.username,role:u.role,offices:u.offices||[]};
  AUTH.loginError="";
  sessionStorage.setItem("rls_session",JSON.stringify({userId:u.id}));
  return true;
}

function doLogout(){
  AUTH.loggedIn=false;AUTH.user=null;AUTH.loginUsername="";AUTH.loginPassword="";
  AUTH.loginCaptcha="";AUTH.loginError="";
  sessionStorage.removeItem("rls_session");
  newCaptcha();renderLogin();
}

function newCaptcha(){
  AUTH.captchaA=Math.floor(Math.random()*9)+1;
  AUTH.captchaB=Math.floor(Math.random()*9)+1;
}

function getVisibleOffices(){
  var all=lGet("rls_offices")||["DHM"];
  if(!AUTH.user||AUTH.user.role==="admin")return all;
  return all.filter(function(o){return AUTH.user.offices.indexOf(o)>=0;});
}

/* ── HELPERS ── */
function sk(s){return s.replace(/[^a-zA-Z0-9]/g,"_");}
function dim(m){return new Date(S.year,MONTHS.indexOf(m)+1,0).getDate();}
function SK(o,s){return "rls_stn_"+sk(o)+"_"+sk(s);}
function TK(o,s,m){return "rls_st_"+sk(o)+"_"+sk(s)+"_"+S.year+"_"+sk(m);}
function LK(o,s,y,m){return "rls_lock_"+sk(o)+"_"+sk(s)+"_"+y+"_"+sk(m);}
function lGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}if(typeof scheduleSave!=="undefined")scheduleSave();}
function lDel(k){try{localStorage.removeItem(k);}catch(e){}}

function isMonthLocked(month){
  return lGet(LK(S.office,S.subtype,S.year,month||S.month))===true;
}

var _toastTimer=null;
function flash(msg,err){
  var t=document.getElementById("toast");if(!t)return;
  t.innerHTML='<div class="toast '+(err?"toast-err":"toast-ok")+'">'+(err?"⚠ ":"✓ ")+msg+'</div>';
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){t.innerHTML="";},2800);
}

/* ── STATUS OPERATIONS ── */
function setStatus(stnId,day,newVal,forMonth){
  var month=forMonth||S.month;
  if(isMonthLocked(month)){flash("🔒 Month is locked. Ask admin to unlock.",true);return;}
  var k=TK(S.office,S.subtype,month);
  if(!S.status[k])S.status[k]={};
  if(!S.status[k][stnId])S.status[k][stnId]={};
  var old=S.status[k][stnId][day]||"";
  // Confirmation when changing to/from A or I
  if(old&&old!==newVal&&(old==="A"||old==="I"||newVal==="A"||newVal==="I")){
    var oL=S_LBL[old]||old,nL=S_LBL[newVal]||"Clear";
    if(!confirm("⚠  Confirm Status Change\n\n  From: "+oL+"\n  To:   "+nL+"\n\n  Day "+day+" — "+month+"\n\nAre you sure you want to make this change?"))return;
  }
  if(newVal===""){delete S.status[k][stnId][day];}else{S.status[k][stnId][day]=newVal;}
  lSet(k,S.status[k]);
  render();
}

function getStnStats(id,forMonth){
  var month=forMonth||S.month;
  var k=TK(S.office,S.subtype,month);
  var st=(S.status[k]&&S.status[k][id])||{};
  var d=dim(month);var r={A:0,I:0,F:0};
  for(var day=1;day<=d;day++){var v=st[day]||"";if(r[v]!==undefined)r[v]++;}
  return r;
}

function getDayTotals(day,forMonth){
  var month=forMonth||S.month;
  var k=TK(S.office,S.subtype,month);
  var stns=S.stns[SK(S.office,S.subtype)]||[];
  var r={A:0,I:0,F:0,"-":0};
  stns.forEach(function(stn){
    var v=(S.status[k]&&S.status[k][stn.id]&&S.status[k][stn.id][day])||"";
    if(r[v]!==undefined)r[v]++;
  });
  return r;
}

/* ── STATUS POPUP ── */
function showStatusPopup(e,stnId,day,forMonth){
  e.stopPropagation();
  var month=forMonth||S.month;
  if(isMonthLocked(month)){flash("🔒 "+month+" is locked. Contact admin.",true);return;}
  var popup=document.getElementById("status-popup");
  var rect=e.currentTarget.getBoundingClientRect();
  popup.style.left=Math.min(rect.left,window.innerWidth-200)+"px";
  popup.style.top=Math.min(rect.bottom+4,window.innerHeight-230)+"px";
  popup.style.display="block";
  popup.innerHTML="";
  var k=TK(S.office,S.subtype,month);
  var cur=(S.status[k]&&S.status[k][stnId]&&S.status[k][stnId][day])||"";
  var title=document.createElement("div");
  title.className="sp-title";
  title.textContent=month+" · Day "+day;
  popup.appendChild(title);
  var opts=[
    {v:"A",label:"Active",    color:"#15803d",bg:"#f0fdf4"},
    {v:"I",label:"Inactive",  color:"#dc2626",bg:"#fef2f2"},
    {v:"F",label:"Flooded Away",color:"#c2410c",bg:"#fff7ed"},
    {v:"-",label:"Unchecked", color:"#6b7280",bg:"#f9fafb"},
    {v:"", label:"Clear",     color:"#94a3b8",bg:"#ffffff"}
  ];
  opts.forEach(function(opt){
    var row=document.createElement("div");
    var isCur=cur===opt.v;
    row.className="sp-opt";
    row.style.background=isCur?opt.bg:"#fff";
    var dot=document.createElement("span");dot.className="sp-dot";dot.style.background=opt.v?opt.color:"#e2e8f0";
    var chk=document.createElement("span");chk.className="sp-chk";chk.textContent=isCur?"✓":"";
    var lbl=document.createElement("span");
    lbl.style.cssText="color:"+opt.color+";font-weight:"+(isCur?"bold":"normal");
    lbl.innerHTML=opt.v?"<b>"+opt.v+"</b> — "+opt.label:"∅ Clear";
    row.appendChild(dot);row.appendChild(chk);row.appendChild(lbl);
    row.onmouseover=function(){this.style.background=opt.bg;};
    row.onmouseout=function(){this.style.background=isCur?opt.bg:"#fff";};
    row.onclick=(function(o,m){return function(ev){
      ev.stopPropagation();
      setStatus(stnId,day,o,m);
      popup.style.display="none";
    };})(opt.v,month);
    popup.appendChild(row);
  });
}

document.addEventListener("click",function(){
  var p=document.getElementById("status-popup");if(p)p.style.display="none";
});

/* ── LOCK / UNLOCK ── */
function lockMonth(){
  if(!confirm("🔒 Lock "+S.month+" "+S.year+" for "+S.office+"?\n\nAll entries will be READ-ONLY.\nOnly Admin can unlock."))return;
  lSet(LK(S.office,S.subtype,S.year,S.month),true);
  flash(S.month+" "+S.year+" is now LOCKED 🔒");render();
}
function unlockMonth(){
  if(!AUTH.user||AUTH.user.role!=="admin"){flash("Only Admin can unlock a month.",true);return;}
  if(!confirm("🔓 Unlock "+S.month+" "+S.year+" for "+S.office+"?\n\nEntries will become editable again."))return;
  lSet(LK(S.office,S.subtype,S.year,S.month),false);
  flash(S.month+" "+S.year+" unlocked 🔓");render();
}

/* ── STATION OPS ── */
function addStation(){
  if(!AUTH.user||AUTH.user.role!=="admin"){flash("Only Admin can add stations.",true);return;}
  var no=S.newNo.trim(),name=S.newName.trim();
  if(!no||!name){flash("Enter station number and name",true);return;}
  var k=SK(S.office,S.subtype);
  var stn={id:"s"+Date.now(),no:no,name:name,type:S.newType,medium:S.newMed};
  S.stns[k]=(S.stns[k]||[]).concat([stn]);lSet(k,S.stns[k]);
  S.newNo="";S.newName="";flash('Station "'+name+'" added');render();
}
function deleteStation(id){
  if(!AUTH.user||AUTH.user.role!=="admin"){flash("Only Admin can remove stations.",true);return;}
  var k=SK(S.office,S.subtype);
  S.stns[k]=(S.stns[k]||[]).filter(function(s){return s.id!==id;});lSet(k,S.stns[k]);
  flash("Station removed");render();
}
function addOffice(){
  if(!AUTH.user||AUTH.user.role!=="admin"){flash("Only Admin can add offices.",true);return;}
  var name=S.newOff.trim();if(!name)return;
  var allOff=lGet("rls_offices")||S.offices;
  if(allOff.indexOf(name)>=0){flash("Office already exists",true);return;}
  allOff.push(name);lSet("rls_offices",allOff);S.offices=allOff;
  SUBTYPES.forEach(function(s){S.stns[SK(name,s)]=[];});
  S.office=name;S.newOff="";S.showAddOff=false;S.showDelOff=false;
  flash('Office "'+name+'" added');render();
}
function deleteOffice(name){
  if(!AUTH.user||AUTH.user.role!=="admin"){flash("Only Admin can delete offices.",true);return;}
  if(name==="DHM"){flash("Cannot delete the default DHM office",true);return;}
  if(!confirm('Delete office "'+name+'"?\nAll its stations and status data will be removed.'))return;
  SUBTYPES.forEach(function(s){
    lDel(SK(name,s));delete S.stns[SK(name,s)];
    MONTHS.forEach(function(m){lDel(TK(name,s,m));});
  });
  var allOff=(lGet("rls_offices")||S.offices).filter(function(o){return o!==name;});
  lSet("rls_offices",allOff);S.offices=allOff;
  if(S.office===name)S.office=allOff[0];
  S.showDelOff=false;flash('Office "'+name+'" deleted');render();
}

/* ── USER MANAGEMENT OPS ── */
function addUser(){
  var nu=S.newUsr;
  if(!nu.username.trim()||!nu.password.trim()){flash("Username and password required",true);return;}
  var users=getUsers();
  if(users.find(function(u){return u.username===nu.username.trim();})){flash("Username already exists",true);return;}
  var selOff=Object.keys(nu.offices).filter(function(o){return nu.offices[o];});
  users.push({id:"u_"+Date.now(),username:nu.username.trim(),pwd:hashPwd(nu.password.trim()),role:nu.role,offices:selOff});
  saveUsers(users);S.newUsr={username:"",password:"",role:"dataentry",offices:{}};
  flash("User '"+nu.username.trim()+"' added");render();
}
function deleteUser(id){
  if(id==="u_admin"){flash("Cannot delete default admin",true);return;}
  if(AUTH.user&&id===AUTH.user.id){flash("Cannot delete yourself",true);return;}
  if(!confirm("Delete this user?"))return;
  saveUsers(getUsers().filter(function(u){return u.id!==id;}));
  flash("User deleted");render();
}
function resetUserPwd(id){
  var np=prompt("Enter new password:");
  if(!np||!np.trim())return;
  var users=getUsers();
  var u=users.find(function(x){return x.id===id;});
  if(u){u.pwd=hashPwd(np.trim());saveUsers(users);flash("Password reset for "+u.username);}
}
function updateUserOffices(id,checkEl,office){
  var users=getUsers();
  var u=users.find(function(x){return x.id===id;});
  if(!u)return;
  if(checkEl.checked){if(u.offices.indexOf(office)<0)u.offices.push(office);}
  else{u.offices=u.offices.filter(function(o){return o!==office;});}
  saveUsers(users);flash("Offices updated");
}

/* ── SUMMARY DOWNLOAD ── */
function downloadSummaryCSV(){
  var stns=S.stns[SK(S.office,S.subtype)]||[];
  MONTHS.forEach(function(m){var k=TK(S.office,S.subtype,m);if(S.status[k]===undefined)S.status[k]=lGet(k)||{};});
  var hdr=["S.N.","Station No.","Station Name"];
  MONTHS.forEach(function(m){for(var d=1;d<=dim(m);d++)hdr.push(m.substring(0,3)+"-"+d);});
  hdr=hdr.concat(["Annual A","Annual I","Annual F","Annual -","Remarks"]);
  var rows=[hdr];
  stns.forEach(function(stn,idx){
    var row=[idx+1,stn.no,stn.name];
    var ann={A:0,I:0,F:0,"-":0};
    MONTHS.forEach(function(m){
      var k=TK(S.office,S.subtype,m);var st=(S.status[k]&&S.status[k][stn.id])||{};
      for(var d=1;d<=dim(m);d++){var v=st[d]||"";row.push(v);if(ann[v]!==undefined)ann[v]++;}
    });
    row=row.concat([ann.A,ann.I,ann.F,ann["-"]]);
    row.push(lGet("rls_rmk_"+sk(S.office)+"_"+sk(S.subtype)+"_"+stn.id)||"");

  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
  var a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);

}

/* ── DOM BUILDER ── */
function el(tag,attrs,children){
  var elem=document.createElement(tag);
  if(attrs){
    if(Array.isArray(attrs)){children=attrs;attrs=null;}
    else{
      Object.keys(attrs).forEach(function(k){
        if(k==="cls")elem.className=attrs[k];
        else if(k==="style")elem.style.cssText=attrs[k];
        else if(k==="onclick")elem.onclick=attrs[k];
        else if(k==="onchange")elem.onchange=attrs[k];
        else if(k==="oninput")elem.oninput=attrs[k];
        else if(k==="onkeydown")elem.onkeydown=attrs[k];
        else elem.setAttribute(k,attrs[k]);
      });
    }
  }
  if(children){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c==null)return;
      if(typeof c==="string"||typeof c==="number")elem.appendChild(document.createTextNode(String(c)));
      else elem.appendChild(c);
    });
  }
  return elem;
}
function txt(s){return document.createTextNode(s);}
function mkSel(opts,val,cls,onchange){
  var s=el("select",{cls:cls,onchange:onchange});
  opts.forEach(function(o){
    var v=typeof o==="object"?o.value:o,l=typeof o==="object"?o.label:o;
    var op=el("option",{value:v},[l]);if(v===val)op.selected=true;s.appendChild(op);
  });
  return s;
}

/* ── BUILD MONTH SECTION (for Annual Summary) ── */
function buildMonthSection(month,stns){
  var k=TK(S.office,S.subtype,month);
  if(S.status[k]===undefined)S.status[k]=lGet(k)||{};
  var d=dim(month);
  var locked=isMonthLocked(month);
  var section=el("div",{cls:"sum-section"});
  section.appendChild(el("div",{cls:"sum-sec-hdr"},[
    el("span",[month+" "+S.year]),
    el("span",{style:"font-size:10px;opacity:.75"},[d+" days"+(locked?" · 🔒":"")])
  ]));
  var tbl=el("table",{cls:"sum-month"});
  // Header
  var hr=el("tr");
  hr.appendChild(el("th",{cls:"tleft",style:"width:20px"},["#"]));
  hr.appendChild(el("th",{cls:"tleft",style:"min-width:100px"},["Station"]));
  for(var i=1;i<=d;i++)hr.appendChild(el("th",[String(i)]));
  hr.appendChild(el("th",{style:"color:#4ade80"},["A"]));
  hr.appendChild(el("th",{style:"color:#f87171"},["I"]));
  hr.appendChild(el("th",{style:"color:#fb923c"},["F"]));
  tbl.appendChild(el("thead",[hr]));
  // Body
  var tbody=el("tbody");
  stns.forEach(function(stn,idx){
    var stnSt=(S.status[k]&&S.status[k][stn.id])||{};
    var tr=el("tr");
    tr.appendChild(el("td",{style:"text-align:center;color:#94a3b8;padding:2px 3px"},[String(idx+1)]));
    var nc=el("td",{style:"padding:2px 6px;white-space:nowrap;overflow:hidden;max-width:100px;font-size:10px"});
    nc.title=stn.name+" ("+stn.no+")";nc.textContent=stn.no+" "+stn.name;tr.appendChild(nc);
    var cnt={A:0,I:0,F:0};
    for(var day=1;day<=d;day++){
      (function(dy){
        var v=stnSt[dy]||"";
        var td=el("td",{cls:"mtick"});
        if(v&&S_BG[v]){td.style.background=S_BG[v];td.style.color=S_CLR[v];td.textContent=v;if(cnt[v]!==undefined)cnt[v]++;}
        td.title=month+" Day "+dy+(v?" : "+(S_LBL[v]||v):" : empty");
        if(!locked){(function(id,m){td.onclick=function(e){showStatusPopup(e,id,dy,m);};})(stn.id,month);}
        else{td.style.cursor="not-allowed";td.title+=" [LOCKED]";}
        tr.appendChild(td);
      })(day);
    }
    tr.appendChild(el("td",{cls:"mcnt",style:"color:#15803d"},[cnt.A||""]));
    tr.appendChild(el("td",{cls:"mcnt",style:"color:#dc2626"},[cnt.I||""]));
    tr.appendChild(el("td",{cls:"mcnt",style:"color:#c2410c"},[cnt.F||""]));
    tbody.appendChild(tr);
  });
  // Footer: day totals
  var fr=el("tr");
  fr.appendChild(el("td",{style:"background:#dce7f0"},[""]));
  fr.appendChild(el("td",{style:"background:#dce7f0;font-weight:bold;padding:2px 6px;font-size:9px;color:#1a3558"},["Day Total"]));
  for(var day=1;day<=d;day++){
    var dt={A:0,I:0,F:0};
    stns.forEach(function(stn){var v=(S.status[k]&&S.status[k][stn.id]&&S.status[k][stn.id][day])||"";if(dt[v]!==undefined)dt[v]++;});
    var tdF=el("td",{style:"text-align:center;background:#dce7f0;font-size:9px"});
    var dom="A",mx=0;
    Object.keys(dt).forEach(function(c){if(dt[c]>mx){mx=dt[c];dom=c;}});
    if(mx>0){tdF.style.color=S_CLR[dom];tdF.style.fontWeight="bold";tdF.textContent=String(mx);}
    fr.appendChild(tdF);
  }
  fr.appendChild(el("td",{style:"background:#dce7f0"},[""]));
  fr.appendChild(el("td",{style:"background:#dce7f0"},[""]));
  fr.appendChild(el("td",{style:"background:#dce7f0"},[""]));
  tbl.appendChild(tbody);tbl.appendChild(el("tfoot",[fr]));
  section.appendChild(el("div",{cls:"sum-sec-body"},[tbl]));
  return section;
}

      txt("🔒  "+S.month+" "+S.year+" is LOCKED — entries are read-only"),
      isAdmin?el("button",{cls:"hdr-btn",style:"font-size:11px;padding:3px 10px;margin-left:4px",onclick:unlockMonth},["🔓 Unlock"]):null
    ]));
  }

  /* ── STATUS TABLE ── */
  var thead=el("thead");
  if(S.month2){
    // Two-row header: row1 = month name spans, row2 = day numbers
    var r1=el("tr");
    var r2=el("tr");
    // Fixed info columns
    [["S.N.","",2],["Stn No.","",2],["Name / River","tleft",2],["Station Type","",2],["Medium","",2]].forEach(function(h){
      var th=el("th",{cls:h[1]});th.setAttribute("rowspan",String(h[2]));th.textContent=h[0];r1.appendChild(th);
    });
    // Month 1 span
    var m1th=el("th",{cls:"msep",colspan:String(days+2),style:"background:#2b4d7c;text-align:center;font-size:11px;padding:3px"});
    m1th.textContent=S.month;r1.appendChild(m1th);
    // Month 2 span
    var m2th=el("th",{cls:"m2h msep",colspan:String(days2+2),style:"text-align:center;font-size:11px;padding:3px"});
    m2th.textContent=S.month2+(locked2?" 🔒":"");r1.appendChild(m2th);
    // Day number rows
    for(var d=1;d<=31;d++){var c=d===1?"msep":d>days?"dim":"";r2.appendChild(el("th",{cls:c},[String(d)]));}
    r2.appendChild(el("th",{cls:"dark"},["A"]));r2.appendChild(el("th",{cls:"dark"},["I"]));
    for(var d=1;d<=31;d++){var c=d===1?"m2h msep":d>days2?"m2h dim":"m2h";r2.appendChild(el("th",{cls:c},[String(d)]));}
    r2.appendChild(el("th",{cls:"dark m2h"},["A"]));r2.appendChild(el("th",{cls:"dark m2h"},["I"]));
    thead.appendChild(r1);thead.appendChild(r2);
  }else{
    var sRow=el("tr");
    [["S.N.",""],["Stn No.",""],["Name / River","tleft"],["Station Type",""],["Medium",""]].forEach(function(h){sRow.appendChild(el("th",{cls:h[1]},[h[0]]));});
    for(var d=1;d<=days;d++)sRow.appendChild(el("th",[String(d)]));
    for(var d=days+1;d<=31;d++)sRow.appendChild(el("th",{cls:"dim"},[String(d)]));
    sRow.appendChild(el("th",{cls:"dark"},["Active"]));
    sRow.appendChild(el("th",{cls:"dark"},["Inactive"]));
    thead.appendChild(sRow);
  }

  // Body
  var tbody=el("tbody");
  if(stns.length===0){
    var noTd=el("td",{cls:"no-stn"},["No stations for "+S.office+" / "+S.subtype+". Open ⚙ Manage Stations to add them."]);
    noTd.setAttribute("colspan",String(5+31+2+(S.month2?31+2:0)));
    tbody.appendChild(el("tr",[noTd]));
  }else{
    stns.forEach(function(stn,i){
      var stats=getStnStats(stn.id);
      var stnSt=curSt[stn.id]||{};
      var tr=el("tr");
      tr.appendChild(el("td",{style:"text-align:center;color:#94a3b8;padding:3px 4px;border-right:1px solid #e2e8f0"},[String(i+1)]));
      tr.appendChild(el("td",{style:"text-align:center;font-family:monospace;padding:3px 4px;border-right:1px solid #e2e8f0"},[stn.no]));
      tr.appendChild(el("td",{style:"text-align:left;padding-left:8px;border-right:1px solid #e2e8f0;overflow:hidden;white-space:nowrap;max-width:168px"},[stn.name]));
      tr.appendChild(el("td",{style:"text-align:center;font-size:10px;color:#64748b;padding:3px 4px;border-right:1px solid #e2e8f0"},[stn.type]));
      tr.appendChild(el("td",{style:"text-align:center;font-size:10px;padding:3px 4px;border-right:1px solid #e2e8f0"},[stn.medium]));
      // Month 1 days
      for(var d=1;d<=31;d++){
        (function(day){
          var v=stnSt[day]||"",active=day<=days;
          var tdCls="day"+(active&&locked?" dlocked":"")+(day===1?" msep":"");
          if(!active)tdCls="grayed";
          var td=el("td",{cls:tdCls});
          if(active){
            if(v){td.style.background=S_BG[v];td.style.color=S_CLR[v];td.textContent=v;}
            else{td.style.color="#dde3ea";}
            td.title=S.month+" Day "+day+(v?" : "+(S_LBL[v]||v):"");
            if(!locked)(function(id,dy,m){td.onclick=function(e){showStatusPopup(e,id,dy,m);};})(stn.id,day,S.month);
          }
          tr.appendChild(td);
        })(d);
      }
      tr.appendChild(el("td",{cls:"active-days"},[stats.A?String(stats.A):""]));
      tr.appendChild(el("td",{cls:"inactive-days"},[stats.I?String(stats.I):""]));
      // Month 2 days (optional)
      if(S.month2&&curSt2){
        var stnSt2=curSt2[stn.id]||{};var stats2=getStnStats(stn.id,S.month2);
        for(var d=1;d<=31;d++){
          (function(day){
            var v=stnSt2[day]||"",active=day<=days2;
            var tdCls="day m2h"+(active&&locked2?" dlocked":"")+(day===1?" msep":"");
            if(!active)tdCls="grayed";
            var td=el("td",{cls:tdCls});
            if(active){
              if(v){td.style.background=S_BG[v];td.style.color=S_CLR[v];td.textContent=v;}
              else{td.style.color="#dde3ea";}
              td.title=S.month2+" Day "+day+(v?" : "+(S_LBL[v]||v):"");
              if(!locked2)(function(id,dy,m){td.onclick=function(e){showStatusPopup(e,id,dy,m);};})(stn.id,day,S.month2);
            }
            tr.appendChild(td);
          })(d);
        }
        tr.appendChild(el("td",{cls:"active-days"},[stats2.A?String(stats2.A):""]));
        tr.appendChild(el("td",{cls:"inactive-days"},[stats2.I?String(stats2.I):""]));
      }
      tbody.appendChild(tr);
    });
  }

  // Footer totals
  var tfoot=el("tfoot");
  if(stns.length>0){
    var fRows=[["Active (A)","#15803d","A"],["Inactive (I)","#dc2626","I"],["Flooded Away (F)","#c2410c","F"],["Unchecked (-)","#6b7280","-"],["Total","#1a3558","total"]];
    fRows.forEach(function(row,ri){
      var label=row[0],color=row[1],key=row[2];
      var tr=el("tr",{cls:ri===4?"total":""});
      var lbl=el("td",{cls:"flbl",style:"color:"+color},[label]);lbl.setAttribute("colspan","5");tr.appendChild(lbl);
      for(var d=1;d<=days;d++){
        var t=getDayTotals(d);
        var v=key==="total"?(t.A+t.I+t.F+t["-"]):(t[key]||0);
        tr.appendChild(el("td",{style:"text-align:center;padding:3px 4px;border-right:1px solid #e2e8f0;font-size:11px;"+(v?"font-weight:bold;color:"+color:"color:#dde3ea")},[v?String(v):""]));
      }
      for(var d=days+1;d<=31;d++)tr.appendChild(el("td",{cls:"grayed"}));
      var et=el("td");et.setAttribute("colspan","2");tr.appendChild(et);
      if(S.month2){
        for(var d=1;d<=days2;d++){
          var t2=getDayTotals(d,S.month2);
          var v2=key==="total"?(t2.A+t2.I+t2.F+t2["-"]):(t2[key]||0);
          tr.appendChild(el("td",{style:"text-align:center;padding:3px 4px;border-right:1px solid #e2e8f0;font-size:11px;background:#f0f7ff;"+(d===1?"border-left:3px solid #9bb5cc;":"")+(v2?"font-weight:bold;color:"+color:"color:#dde3ea")},[v2?String(v2):""]));
        }
        for(var d=days2+1;d<=31;d++)tr.appendChild(el("td",{cls:"grayed"}));
        var et2=el("td");et2.setAttribute("colspan","2");tr.appendChild(et2);
      }
      tfoot.appendChild(tr);
    });
  }

  var tbl=el("table",{cls:"status"});
  tbl.style.minWidth=(433+days*26+(S.month2?days2*26+92:0))+"px";
  var cg=el("colgroup");
  [32,58,168,120,55].forEach(function(w){var c=el("col");c.style.width=w+"px";cg.appendChild(c);});
  for(var ci=0;ci<31;ci++){var c=el("col");c.style.width="26px";cg.appendChild(c);}
  [46,46].forEach(function(w){var c=el("col");c.style.width=w+"px";cg.appendChild(c);});
  if(S.month2){
    for(var ci=0;ci<31;ci++){var c=el("col");c.style.width="26px";cg.appendChild(c);}
    [46,46].forEach(function(w){var c=el("col");c.style.width=w+"px";cg.appendChild(c);});
  }
  tbl.appendChild(cg);tbl.appendChild(thead);tbl.appendChild(tbody);tbl.appendChild(tfoot);
  app.appendChild(el("div",{cls:"tbl-wrap"},[tbl]));

  app.appendChild(el("div",{cls:"footer"},[
    el("span",["Changes auto-saved to browser storage"+(locked?" · 🔒 Month Locked":"")]),
    el("span",[S.office+" · "+S.subtype+" · "+S.month+" "+S.year+" · "+stns.length+" station"+(stns.length!==1?"s":"")])
  ]));
  app.appendChild(el("div",{cls:"dev-footer"},["Developed by: Avishek Pokhrel, Hydrologist, DHM"]));
}

/* ── INIT ── */
window._appRender=render;
newCaptcha();
if(checkSession()){
  if(typeof gsLoad!=="undefined"){
    gsLoad(function(){render();if(typeof startAutoRefresh!=="undefined")startAutoRefresh();});
  }else{render();}
}else{
  renderLogin();
}
</script>
</body>
</html>
